<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1200 630"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Traffic distributed by a load balancer</title>
  <desc id="desc">
    Clients send traffic to a load balancer, which distributes requests across
    three application servers.
  </desc>
  <defs>
    <marker
      id="arrow"
      viewBox="0 0 10 10"
      refX="9"
      refY="5"
      markerWidth="8"
      markerHeight="8"
      orient="auto-start-reverse"
    >
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff6b01" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow
        dx="0"
        dy="8"
        stdDeviation="10"
        flood-color="#111827"
        flood-opacity="0.12"
      />
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#f8fafc" />
  <text
    x="600"
    y="72"
    text-anchor="middle"
    font-family="system-ui, sans-serif"
    font-size="36"
    font-weight="700"
    fill="#212737"
  >
    With a load balancer
  </text>
  <text
    x="600"
    y="112"
    text-anchor="middle"
    font-family="system-ui, sans-serif"
    font-size="21"
    fill="#64748b"
  >
    One entry point, several application servers
  </text>

  <g
    font-family="system-ui, sans-serif"
    font-size="22"
    font-weight="650"
    text-anchor="middle"
    fill="#212737"
  >
    <g filter="url(#shadow)">
      <rect
        x="55"
        y="188"
        width="190"
        height="72"
        fill="#ffffff"
        stroke="#cbd5e1"
        stroke-width="3"
      />
      <text x="150" y="233">Client A</text>
    </g>
    <g filter="url(#shadow)">
      <rect
        x="55"
        y="289"
        width="190"
        height="72"
        fill="#ffffff"
        stroke="#cbd5e1"
        stroke-width="3"
      />
      <text x="150" y="334">Client B</text>
    </g>
    <g filter="url(#shadow)">
      <rect
        x="55"
        y="390"
        width="190"
        height="72"
        fill="#ffffff"
        stroke="#cbd5e1"
        stroke-width="3"
      />
      <text x="150" y="435">Client C</text>
    </g>
  </g>

  <g fill="none" stroke="#ff6b01" stroke-width="5" marker-end="url(#arrow)">
    <path d="M245 224 C330 224 335 276 410 296" />
    <path d="M245 325 H410" />
    <path d="M245 426 C330 426 335 374 410 354" />
  </g>

  <g filter="url(#shadow)">
    <rect x="420" y="232" width="300" height="188" fill="#ff6b01" />
    <path
      d="M484 296 H656 M484 326 H622 M484 356 H644"
      stroke="#ffffff"
      stroke-width="12"
      stroke-linecap="round"
      opacity="0.9"
    />
    <text
      x="570"
      y="394"
      text-anchor="middle"
      font-family="system-ui, sans-serif"
      font-size="25"
      font-weight="750"
      fill="#212737"
    >
      Load balancer
    </text>
  </g>

  <g fill="none" stroke="#ff6b01" stroke-width="5" marker-end="url(#arrow)">
    <path d="M720 284 C795 284 790 217 850 217" />
    <path d="M720 326 H850" />
    <path d="M720 368 C795 368 790 435 850 435" />
  </g>

  <g
    font-family="system-ui, sans-serif"
    font-size="21"
    font-weight="700"
    text-anchor="middle"
    fill="#ffffff"
  >
    <g filter="url(#shadow)">
      <rect x="860" y="166" width="280" height="102" fill="#212737" />
      <text x="1000" y="226">Server A</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="860" y="275" width="280" height="102" fill="#212737" />
      <text x="1000" y="335">Server B</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="860" y="384" width="280" height="102" fill="#212737" />
      <text x="1000" y="444">More servers</text>
    </g>
  </g>
</svg>
