<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1200 630"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Traffic sent directly to one server</title>
  <desc id="desc">
    Three clients send all traffic directly to one overloaded application
    server.
  </desc>
  <defs>
    <marker
      id="arrow"
      viewBox="0 0 10 10"
      refX="9"
      refY="5"
      markerWidth="8"
      markerHeight="8"
      orient="auto-start-reverse"
    >
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff6b01" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow
        dx="0"
        dy="8"
        stdDeviation="10"
        flood-color="#111827"
        flood-opacity="0.12"
      />
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#f8fafc" />
  <text
    x="600"
    y="72"
    text-anchor="middle"
    font-family="system-ui, sans-serif"
    font-size="36"
    font-weight="700"
    fill="#212737"
  >
    Without a load balancer
  </text>
  <text
    x="600"
    y="112"
    text-anchor="middle"
    font-family="system-ui, sans-serif"
    font-size="21"
    fill="#64748b"
  >
    Every request depends on one server
  </text>

  <g
    font-family="system-ui, sans-serif"
    font-size="23"
    font-weight="650"
    text-anchor="middle"
    fill="#212737"
  >
    <g filter="url(#shadow)">
      <rect
        x="90"
        y="172"
        width="220"
        height="88"
        fill="#ffffff"
        stroke="#cbd5e1"
        stroke-width="3"
      />
      <text x="200" y="226">Client A</text>
    </g>
    <g filter="url(#shadow)">
      <rect
        x="90"
        y="286"
        width="220"
        height="88"
        fill="#ffffff"
        stroke="#cbd5e1"
        stroke-width="3"
      />
      <text x="200" y="340">Client B</text>
    </g>
    <g filter="url(#shadow)">
      <rect
        x="90"
        y="400"
        width="220"
        height="88"
        fill="#ffffff"
        stroke="#cbd5e1"
        stroke-width="3"
      />
      <text x="200" y="454">Client C</text>
    </g>
  </g>

  <g fill="none" stroke="#ff6b01" stroke-width="6" marker-end="url(#arrow)">
    <path d="M310 216 C470 216 510 284 700 304" />
    <path d="M310 330 H700" />
    <path d="M310 444 C470 444 510 376 700 356" />
  </g>

  <g filter="url(#shadow)">
    <rect
      x="710"
      y="224"
      width="380"
      height="220"
      fill="#212737"
      stroke="#ff6b01"
      stroke-width="6"
    />
    <rect x="755" y="270" width="290" height="24" fill="#475569" />
    <circle cx="780" cy="350" r="10" fill="#ff6b01" />
    <circle cx="818" cy="350" r="10" fill="#fbbf24" />
    <circle cx="856" cy="350" r="10" fill="#ef4444" />
    <text
      x="900"
      y="405"
      text-anchor="middle"
      font-family="system-ui, sans-serif"
      font-size="27"
      font-weight="700"
      fill="#ffffff"
    >
      Application server
    </text>
  </g>

  <rect x="760" y="492" width="280" height="58" fill="#fee2e2" />
  <text
    x="900"
    y="529"
    text-anchor="middle"
    font-family="system-ui, sans-serif"
    font-size="22"
    font-weight="700"
    fill="#b91c1c"
  >
    Single point of failure
  </text>
</svg>
